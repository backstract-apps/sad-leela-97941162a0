name: BackStract GitHub Actions Log Streamer
description: Stream shell command logs to BackStract's backend in real time.

inputs:
  command:
    description: Shell command to run
    required: true
  endpoint:
    description: Log streaming HTTP endpoint
    required: true
  token:
    description: Auth token
    required: true
  step_name:
    description: Name of the deployment step
    required: true

runs:
  using: composite
  steps:
    - shell: bash
      env:
        STEP_NAME: ${{ inputs.step_name }}
        STREAM_ENDPOINT: ${{ inputs.endpoint }}
        STREAM_TOKEN: ${{ inputs.token }}
      run: |
        #!/usr/bin/env bash
        set -eo pipefail

        buffer=()
        buffer_size=0
        max_buffer_lines=5

        flush() {
          if [ "${#buffer[@]}" -eq 0 ]; then
            return
          fi

          json=$(jq -nc \
            --arg run_id "$GITHUB_RUN_ID" \
            --arg step "$STEP_NAME" \
            --arg repo "$GITHUB_REPOSITORY" \
            --arg branch "$GITHUB_REF_NAME" \
            --arg commit_sha "$GITHUB_SHA" \
            --arg actor "$GITHUB_ACTOR" \
            --argjson logs "$(printf '%s\n' "${buffer[@]}" | jq -R . | jq -s .)" \
            '{run_id: $run_id, step: $step, repository: $repo, branch: $branch, commit_sha: $commit_sha, actor: $actor, logs: $logs}')

          curl -s -X POST "$STREAM_ENDPOINT" \
            --connect-timeout 2 \
            --max-time 5 \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer $STREAM_TOKEN" \
            -d "$json" > /dev/null 2>&1 &

          buffer=()
          buffer_size=0
        }

        command_exit_code=0
        temp_file=$(mktemp)
        script_file=$(mktemp)

        trap 'rm -f "$temp_file" "$script_file"; wait' EXIT

        cat <<'EOF' > "$script_file"
        ${{ inputs.command }}
        EOF

        chmod +x "$script_file"

        set +e
        bash "$script_file" 2>&1 | tee "$temp_file"
        command_exit_code="${PIPESTATUS[0]}"
        set -e
        echo "Step completed with exit code: ${command_exit_code}" >> "$temp_file"

        while IFS= read -r line; do
          buffer+=("$line")
          buffer_size=$((buffer_size + 1))

          # Emit DONE as soon as strict smoke check passes.
          if [[ "$line" == *"Smoke check passed with 200 on"* ]]; then
            buffer+=("DONE")
            buffer_size=$((buffer_size + 1))
            flush
            continue
          fi

          if [ "$buffer_size" -ge "$max_buffer_lines" ]; then
            flush
          fi
        done < "$temp_file"

        flush

        if [[ "$STEP_NAME" == "Deploy to AWS EKS Cluster" ]] || [[ "$STEP_NAME" == "Build and push to ECR" ]]; then
          wait
        fi

        exit "$command_exit_code"

